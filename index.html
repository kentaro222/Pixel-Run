<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Pixel Run - 1bit Edition</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        #game-container { position: relative; width: 640px; height: 360px; border: 4px solid #fff; overflow: hidden; } /* 枠線も白に */
        canvas { 
            display: block; 
            image-rendering: pixelated; /* ブラウザ側での拡大時のぼやけ防止 */
            image-rendering: crisp-edges;
        }
        #ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; pointer-events: none; z-index: 10; }
        #scoreDisplay { font-size: 24px; text-shadow: 2px 2px #000; font-weight: bold; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div>PIXEL RUN</div>
            <div id="scoreDisplay">SCORE: 000000</div>
        </div>
        <canvas id="gameCanvas" width="640" height="360"></canvas>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');

    // ★ 画像のぼやけを完全に防ぐ設定
    ctx.imageSmoothingEnabled = false;

    // ==========================================
    // カラーパレット設定（ここで色を一括管理）
    // ==========================================
    const COLORS = {
        BG: "#000000",      // 背景色（黒）
        FG: "#ffffff",      // 前景色（白：キャラ、地面、障害物）
        UI: "#ffffff",      // スコアなどの色
        EFFECT: "#ffffff"   // 砂埃や死亡時のエフェクト
    };

    const CONFIG = {
        GRAVITY: 0.6,
        FIRST_JUMP_POWER: -11,
        SECOND_JUMP_POWER: -8,
        SECOND_JUMP_SPEED_MULTI: 0.8,
        MAX_JUMPS: 2,
        BASE_SPEED: 6.0,
        SPEED_UP_RATIO: 0.0025,
        PLAYER_SIZE: 42,
        HIT_BOX_MARGIN_X: 12,
        HIT_BOX_MARGIN_Y: 12 
    };

    const SPRITE_SHEET_URL = 'player_1bit00_sheet.png'; 
    const GROUND_Y = 300;
    
    let gameActive = true;
    let score = 0;
    let currentSpeed = CONFIG.BASE_SPEED;
    let obstacles = [];
    let particles = [];
    let frame = 0;
    let bgScroll = 0;
    
    let distanceTraveled = 0;
    let nextSpawnDistance = 100;

    const spriteSheet = new Image();
    spriteSheet.src = SPRITE_SHEET_URL;
    let imagesLoaded = false;
    spriteSheet.onload = () => { imagesLoaded = true; };

    class Particle {
        constructor(x, y, color, vx, vy) {
            this.x = x; this.y = y; this.color = color; this.vx = vx; this.vy = vy;
            this.life = 1.0; 
            this.size = Math.random() * 3 + 1;
        }
        update() { 
            this.x += this.vx - currentSpeed * 0.4; 
            this.y += this.vy; 
            this.life -= 0.06;
        }
        draw() {
            if (this.life <= 0) return;
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.fillRect(Math.floor(this.x), Math.floor(this.y), this.size, this.size);
            ctx.globalAlpha = 1.0;
        }
    }

    function createDust(x, y, count, color) {
        for (let i = 0; i < count; i++) {
            particles.push(new Particle(x, y, color, (Math.random() - 0.5) * 5, (Math.random() - 0.5) * 5));
        }
    }

    const player = {
        x: 80, y: 0, vy: 0, w: CONFIG.PLAYER_SIZE, h: CONFIG.PLAYER_SIZE,
        jumpCount: 0, isFallingIntoPit: false,

        update() {
            this.vy += CONFIG.GRAVITY;
            this.y += this.vy;

            if (!this.isFallingIntoPit) {
                if (this.y > GROUND_Y - this.h) {
                    if (this.checkOnPit()) {
                        this.isFallingIntoPit = true;
                    } else {
                        if (this.vy > 8) createDust(this.x + this.w/2, GROUND_Y, 5, COLORS.EFFECT);
                        this.y = GROUND_Y - this.h;
                        this.vy = 0;
                        this.jumpCount = 0;
                    }
                }
            }
            if (this.y > canvas.height) gameOver("VOID");
        },

        checkOnPit() {
            const pLeft = this.x + this.w * 0.3;
            const pRight = this.x + this.w * 0.7;
            const pitForgiveness = 16;
            
            return obstacles.some(o => 
                o.type === 'PIT' && 
                pLeft > o.x && 
                pRight < (o.x + o.w - pitForgiveness)
            );
        },

        draw() {
            if (!imagesLoaded) return;
            ctx.imageSmoothingEnabled = false; // ★ 描画直前にも念のため設定
            let sx = (this.jumpCount > 0) ? 32 : (Math.floor(frame / 8) % 2 ? 16 : 0);
            ctx.save();
            ctx.translate(Math.floor(this.x + this.w), Math.floor(this.y));
            ctx.scale(-1, 1);
            ctx.drawImage(spriteSheet, sx, 0, 16, 16, 0, 0, this.w, this.h);
            ctx.restore();
        },

        jump() {
            if (this.jumpCount < CONFIG.MAX_JUMPS && !this.isFallingIntoPit) {
                if (this.jumpCount === 0) this.vy = CONFIG.FIRST_JUMP_POWER;
                else if (this.jumpCount === 1) this.vy = CONFIG.SECOND_JUMP_POWER;
                this.jumpCount++;
                createDust(this.x + this.w/2, this.y + this.h, 6, COLORS.EFFECT);
            }
        }
    };

    function spawnObstacle() {
        if (distanceTraveled >= nextSpawnDistance) {
            distanceTraveled = 0;
            let speedFactor = (currentSpeed - CONFIG.BASE_SPEED) * 15;
            nextSpawnDistance = 250 + Math.random() * 250 + speedFactor;

            const rand = Math.random();
            let type, w, h, y, isPassable = false;

            if (rand < 0.25) { 
                // 穴
                type = 'PIT'; w = 80 + Math.random() * 110; h = 100; y = GROUND_Y;
            } else if (rand < 0.60) { 
                // 壁（地上障害物をここに統合）
                type = 'WALL'; 
                h = 40 + Math.random() * 60; // 低いものから高いものまでランダム
                w = 20 + Math.random() * 30; 
                y = GROUND_Y - h; 
            } else { 
                // 浮遊物
                type = 'FLOAT'; 
                w = 30 + Math.random() * 120;
                if (Math.random() < 0.5) {
                    isPassable = true;
                    h = 20 + Math.random() * 40;
                    let gapUnderneath = CONFIG.PLAYER_SIZE + 5 + Math.random() * 40; 
                    y = GROUND_Y - gapUnderneath - h;
                } else {
                    isPassable = false;
                    h = 30 + Math.random() * 50;
                    let gapUnderneath = 10 + Math.random() * 15; 
                    y = GROUND_Y - gapUnderneath - h;
                }
            }
            obstacles.push({ type, x: canvas.width, y, w, h, isPassable });
        }
    }

    function loop() {
        if (!gameActive) return;
        frame++; 
        score += Math.floor(currentSpeed); 
        currentSpeed += CONFIG.SPEED_UP_RATIO;
        
        let effectiveSpeed = currentSpeed;
        if (player.jumpCount === 2) effectiveSpeed *= CONFIG.SECOND_JUMP_SPEED_MULTI;
        
        distanceTraveled += effectiveSpeed;

        player.update(); 
        spawnObstacle();

        // 背景
        ctx.fillStyle = COLORS.BG;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 背景のグリッド（白黒になじむよう薄いグレーを計算）
        bgScroll -= effectiveSpeed * 0.15;
        ctx.fillStyle = "rgba(255,255,255,0.05)";
        for (let i = 0; i < 15; i++) {
            let bx = (bgScroll % 100) + i * 100;
            ctx.fillRect(Math.floor(bx), 0, 1, canvas.height);
        }

        // 地面
        ctx.fillStyle = COLORS.FG;
        ctx.fillRect(0, GROUND_Y, canvas.width, 4); // 地面を厚い線にする（スタイリッシュ！）
        ctx.fillStyle = COLORS.BG;
        ctx.fillRect(0, GROUND_Y + 4, canvas.width, canvas.height - GROUND_Y);

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.x -= effectiveSpeed;

            if (o.type === 'PIT') {
                ctx.fillStyle = COLORS.BG; // 穴は背景と同じ色で抜く
                ctx.fillRect(Math.floor(o.x), GROUND_Y, Math.floor(o.w), 10);
            } else {
                ctx.fillStyle = COLORS.FG;
                // 浮遊物で「くぐれない」ものは、少し模様（枠線）をつけるなどのアレンジも可能
                ctx.fillRect(Math.floor(o.x), Math.floor(o.y), Math.floor(o.w), Math.floor(o.h));
            }

            if (o.type !== 'PIT') {
                const mx = CONFIG.HIT_BOX_MARGIN_X;
                const my = CONFIG.HIT_BOX_MARGIN_Y;
                if (o.x < player.x + player.w - mx && 
                    o.x + o.w > player.x + mx &&
                    o.y < player.y + player.h - my && 
                    o.y + o.h > player.y + my) {
                    gameOver("CAUGHT BY " + o.type);
                }
            }
            if (o.x < -300) obstacles.splice(i, 1);
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.update(); p.draw();
            if (p.life <= 0) particles.splice(i, 1);
        }

        player.draw();
        scoreDisplay.style.color = COLORS.UI;
        scoreDisplay.innerText = "SCORE: " + String(score).padStart(6, '0');
        requestAnimationFrame(loop);
    }

    function gameOver(msg) {
        gameActive = false;
        createDust(player.x + player.w/2, player.y + player.h/2, 30, COLORS.EFFECT);
        particles.forEach(p => { p.update(); p.draw(); });
        setTimeout(() => { alert(msg + "\nSCORE: " + score); location.reload(); }, 100);
    }

    window.addEventListener('keydown', (e) => { if (e.code === 'Space' || e.code === 'ArrowUp') player.jump(); });
    window.addEventListener('touchstart', (e) => { player.jump(); e.preventDefault(); }, {passive: false});

    loop();
</script>
</body>
</html>
