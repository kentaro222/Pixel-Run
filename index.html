<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Run - 1bit Mobile Edition</title>
    <style>
        /* 全体レイアウト */
        body { 
            margin: 0; background: #000; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw;
            color: #fff; font-family: 'Courier New', monospace; 
            overflow: hidden; touch-action: none;
        }

        #game-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        canvas { 
            display: block; 
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border: 2px solid #fff;
            background-color: #000;
        }

        /* スタート画面のオーバーレイ */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); /* 背景を少し透過させて暗くする */
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 20;
        }

        /* 1-bitスタイルのボタン */
        #start-button {
            background: #fff; color: #000;
            border: 4px solid #fff;
            padding: 15px 40px;
            font-family: 'Courier New', monospace;
            font-size: 24px; font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 0 4px #000 inset; /* 内側に黒枠を入れてボタンっぽく */
        }
        #start-button:active {
            background: #ccc; /* 押した時の反応 */
        }

        #ui { 
            position: absolute; 
            top: 10px; width: 100%; 
            display: flex; justify-content: space-between; 
            padding: 0 20px; box-sizing: border-box; 
            pointer-events: none; z-index: 10; 
        }
        #scoreDisplay { font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div id="start-screen">
            <h1 style="margin-bottom: 30px;">PIXEL RUN</h1>
            <button id="start-button">START GAME</button>
        </div>

        <div id="ui">
            <div id="titleDisplay">PIXEL RUN</div>
            <div id="scoreDisplay">SCORE: 000000</div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const startScreen = document.getElementById('start-screen');
    const startButton = document.getElementById('start-button');

    // ... (COLORS, CONFIG, プレイヤー、障害物生成、loop関数などは以前のまま) ...
    // ※ 変更がない部分は省略していますが、お手元のコードのままで大丈夫です。

    // 以前のコードと共通の設定部分
    const COLORS = { BG: "#000000", FG: "#ffffff", UI: "#ffffff", EFFECT: "#ffffff" };
    const INTERNAL_W = 640; const INTERNAL_H = 360;
    const CONFIG = {
        GRAVITY: 0.6, FIRST_JUMP_POWER: -11, SECOND_JUMP_POWER: -8, SECOND_JUMP_SPEED_MULTI: 0.8,
        MAX_JUMPS: 2, BASE_SPEED: 5.0, SPEED_UP_RATIO: 0.0025, PLAYER_SIZE: 48,
        HIT_BOX_MARGIN_X: 14, HIT_BOX_MARGIN_Y: 14 
    };
    const SPRITE_SHEET_URL = 'player_1bit00_sheet.png'; 
    const GROUND_Y = 300;
    
    let gameActive = false; // ★ 最初は false に変更
    let score = 0; let currentSpeed = CONFIG.BASE_SPEED; let obstacles = []; let particles = []; let frame = 0;
    let bgScroll = 0; let distanceTraveled = 0; let nextSpawnDistance = 100;

    function resize() {
        const scaleX = window.innerWidth / INTERNAL_W;
        const scaleY = window.innerHeight / INTERNAL_H;
        let scale = Math.max(1, Math.floor(Math.min(scaleX, scaleY)));
        if (scaleX < 1 || scaleY < 1) scale = Math.min(scaleX, scaleY);
        canvas.width = INTERNAL_W; canvas.height = INTERNAL_H;
        canvas.style.width = (INTERNAL_W * scale) + "px"; canvas.style.height = (INTERNAL_H * scale) + "px";
        ctx.imageSmoothingEnabled = false;
    }
    window.addEventListener('resize', resize);
    resize();

    const spriteSheet = new Image();
    spriteSheet.src = SPRITE_SHEET_URL;
    let imagesLoaded = false;
    spriteSheet.onload = () => { 
        imagesLoaded = true;
        // 最初の1フレームだけ描画して背景を見せておく（お好みで）
        drawInitialState();
    };

    function drawInitialState() {
        ctx.fillStyle = COLORS.BG; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = COLORS.FG; ctx.fillRect(0, GROUND_Y, canvas.width, 4);
        // キャラクターも描画
        if (imagesLoaded) {
            ctx.save(); ctx.translate(80 + 48, GROUND_Y - 48); ctx.scale(-1, 1);
            ctx.drawImage(spriteSheet, 0, 0, 16, 16, 0, 0, 48, 48); ctx.restore();
        }
    }

    // --- (Particle, player, spawnObstacle, loop, gameOver関数群 ... これらは変更なし) ---
    // ※ loop関数内の一番上にある「if (!gameActive) return;」が重要になります。

    /* --- ここからスタート処理 --- */
    function startGame() {
        startScreen.style.display = 'none'; // スタート画面を隠す
        gameActive = true;
        loop(); // ループ開始
    }

    startButton.addEventListener('click', startGame);
    // モバイルでの反応を速くするためにタッチイベントも
    startButton.addEventListener('touchstart', (e) => {
        e.preventDefault();
        startGame();
    }, {passive: false});

    // 入力（ジャンプ）
    window.addEventListener('keydown', (e) => { if (e.code === 'Space' || e.code === 'ArrowUp') player.jump(); });
    // ゲーム画面を直接触った時だけジャンプ（スタート画面を触った時は反応させない）
    canvas.addEventListener('touchstart', (e) => { 
        if(gameActive) { player.jump(); e.preventDefault(); }
    }, {passive: false});

    // サービスワーカー登録
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
        });
    }

    // ★ 以前あった最後の loop(); 呼び出しは削除 ★
</script>
</body>
</html>
