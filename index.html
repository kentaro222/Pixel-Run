<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PIXEL RUN</title>
    <style>
        body { 
            margin: 0; background: #000; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw;
            color: #fff; font-family: 'Courier New', monospace; 
            overflow: hidden; touch-action: none;
        }
        #game-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }
        canvas { 
            display: block; 
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border: 2px solid #fff;
            background-color: #000;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 20;
            text-align: center;
        }

        .pixel-button {
            background: #fff; color: #000;
            border: 4px solid #fff;
            padding: 15px 40px;
            font-family: 'Courier New', monospace;
            font-size: 24px; font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 0 4px #000 inset;
            margin-top: 20px;
        }
        .pixel-button:active { background: #ccc; }

        #ui { 
            position: absolute; 
            top: 10px; width: 100%; 
            display: flex; justify-content: space-between; 
            padding: 0 20px; box-sizing: border-box; 
            pointer-events: none; z-index: 10; 
        }
        #scoreDisplay { font-size: 20px; font-weight: bold; }

        .score-text { font-size: 32px; margin: 10px 0; }
        .high-score-text { font-size: 18px; color: #aaa; }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div id="start-screen" class="overlay">
            <h1 style="font-size: 48px; margin-bottom: 10px;">PIXEL RUN</h1>
            <p class="high-score-text" id="start-best-score">BEST: 000000</p>
            <button id="start-button" class="pixel-button">START GAME</button>
        </div>

        <div id="game-over-screen" class="overlay" style="display: none;">
            <h1 style="font-size: 40px; color: #fff; margin-bottom: 10px;">GAME OVER</h1>
            <p id="final-score" class="score-text">SCORE: 000000</p>
            <p id="best-score-notice" class="high-score-text">BEST: 000000</p>
            <button id="restart-button" class="pixel-button">RETRY</button>
        </div>

        <div id="ui">
            <div id="titleDisplay">PIXEL RUN</div>
            <div id="scoreDisplay">SCORE: 000000</div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    
    const COLORS = { BG: "#000000", FG: "#ffffff", UI: "#ffffff", EFFECT: "#ffffff" };
    
    // ★調整ポイント: ゲームの内部解像度（描画エリアの広さ）
    const INTERNAL_W = 640; 
    const INTERNAL_H = 360;

    // ★調整ポイント: ゲームの基本設定（最もバランスに影響します）
    const CONFIG = {
        GRAVITY: 0.6,                // 重力。大きいほど落下が早く、ジャンプが重く感じられます。
        FIRST_JUMP_POWER: -11,       // 1回目のジャンプ力。マイナス値が大きいほど高く飛びます。
        SECOND_JUMP_POWER: -8,       // 2回目（空中）のジャンプ力。
        SECOND_JUMP_SPEED_MULTI: 0.8,// 2段ジャンプ中の進行速度倍率（0.8なら、空中で少し減速するようになります）。
        MAX_JUMPS: 2,                // 最大ジャンプ回数。3にすれば3段ジャンプが可能になります。
        BASE_SPEED: 5.0,             // ゲーム開始時のスクロール速度（難易度のベース）（初期値5.0）。
        SPEED_UP_RATIO: 0.0008,      // 1フレームごとの速度上昇量。大きいほど急激にゲームが難しくなります。（初期値25）
        PLAYER_SIZE: 48,             // プレイヤーキャラクターのサイズ（幅・高さ）。
        HIT_BOX_MARGIN_X: 14,        // 横方向の当たり判定の余白（大きいほど当たり判定が小さくなり、プレイヤーに有利になります）。
        HIT_BOX_MARGIN_Y: 14         // 縦方向の当たり判定の余白。
    };

    const SPRITE_SHEET_URL = 'player_1bit00_sheet.png'; 
    
    // ★調整ポイント: 地面の高さ（上から何ピクセル目に地面を描画するか）
    const GROUND_Y = 300;
    
    let gameActive = false;
    let score = 0;
    let currentSpeed = CONFIG.BASE_SPEED;
    let obstacles = [];
    let particles = [];
    let frame = 0;
    let bgScroll = 0;
    let distanceTraveled = 0;
    let nextSpawnDistance = 100;

    // ハイスコアの読み込み
    let highScore = localStorage.getItem('pixelRunHighScore') || 0;
    document.getElementById('start-best-score').innerText = "BEST: " + String(highScore).padStart(6, '0');

    function resize() {
        const scaleX = window.innerWidth / INTERNAL_W;
        const scaleY = window.innerHeight / INTERNAL_H;
        let scale = Math.max(1, Math.floor(Math.min(scaleX, scaleY)));
        if (scaleX < 1 || scaleY < 1) scale = Math.min(scaleX, scaleY);
        canvas.width = INTERNAL_W; canvas.height = INTERNAL_H;
        canvas.style.width = (INTERNAL_W * scale) + "px";
        canvas.style.height = (INTERNAL_H * scale) + "px";
        ctx.imageSmoothingEnabled = false;
    }
    window.addEventListener('resize', resize);
    resize();

    const spriteSheet = new Image();
    spriteSheet.src = SPRITE_SHEET_URL;
    let imagesLoaded = false;
    spriteSheet.onload = () => { imagesLoaded = true; drawInitialState(); };

    function drawInitialState() {
        ctx.fillStyle = COLORS.BG; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = COLORS.FG; ctx.fillRect(0, GROUND_Y, canvas.width, 4);
        if (imagesLoaded) {
            // ★調整ポイント: 待機画面のプレイヤーの描画位置（X=80, Y=GROUND_Y）
            ctx.save(); ctx.translate(Math.floor(80 + CONFIG.PLAYER_SIZE), Math.floor(GROUND_Y - CONFIG.PLAYER_SIZE));
            ctx.scale(-1, 1);
            ctx.drawImage(spriteSheet, 0, 0, 16, 16, 0, 0, CONFIG.PLAYER_SIZE, CONFIG.PLAYER_SIZE);
            ctx.restore();
        }
    }

    // 砂埃などのエフェクト（パーティクル）のクラス
    class Particle {
        constructor(x, y, color, vx, vy) {
            this.x = x; this.y = y; this.color = color; this.vx = vx; this.vy = vy;
            this.life = 1.0; 
            // ★調整ポイント: パーティクルの初期サイズ（1〜4ピクセルのランダム）
            this.size = Math.random() * 3 + 1;
        }
        update() { 
            // ★調整ポイント: スクロールに対するパーティクルの流れる速度の割合（0.4）
            this.x += this.vx - currentSpeed * 0.4; 
            this.y += this.vy; 
            // ★調整ポイント: パーティクルが消えるまでの早さ。大きいほどすぐ消えます
            this.life -= 0.06; 
        }
        draw() {
            if (this.life <= 0) return;
            ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
            ctx.fillRect(Math.floor(this.x), Math.floor(this.y), Math.floor(this.size), Math.floor(this.size));
            ctx.globalAlpha = 1.0;
        }
    }

    function createDust(x, y, count, color) {
        for (let i = 0; i < count; i++) {
            // ★調整ポイント: パーティクルの飛び散る勢い（-2.5 〜 +2.5 の範囲）
            particles.push(new Particle(x, y, color, (Math.random() - 0.5) * 5, (Math.random() - 0.5) * 5));
        }
    }

    const player = {
        x: 80, y: 0, vy: 0, w: CONFIG.PLAYER_SIZE, h: CONFIG.PLAYER_SIZE,
        jumpCount: 0, isFallingIntoPit: false,
        update() {
            this.vy += CONFIG.GRAVITY; this.y += this.vy;
            if (!this.isFallingIntoPit) {
                if (this.y > GROUND_Y - this.h) {
                    if (this.checkOnPit()) { this.isFallingIntoPit = true; } 
                    else {
                        // ★調整ポイント: 着地時に土埃を出す落下速度の閾値（8）と、土埃の数（5）
                        if (this.vy > 8) createDust(this.x + this.w/2, GROUND_Y, 5, COLORS.EFFECT);
                        this.y = GROUND_Y - this.h; this.vy = 0; this.jumpCount = 0;
                    }
                }
            }
            if (this.y > canvas.height) gameOver("VOID");
        },
        checkOnPit() {
            // ★調整ポイント: 落とし穴に落ちる判定の厳しさ（0.3=左端から30%, 0.7=右端から30%）
            // これを調整すると「穴のフチでギリギリ耐える」挙動が変わります
            const pLeft = this.x + this.w * 0.3; 
            const pRight = this.x + this.w * 0.7;
            // 穴の幅に対する猶予（-16ピクセル）
            return obstacles.some(o => o.type === 'PIT' && pLeft > o.x && pRight < (o.x + o.w - 16));
        },
        draw() {
            if (!imagesLoaded) return;
            // ★調整ポイント: アニメーションの切り替え速度（8フレームごと）
            let sx = (this.jumpCount > 0) ? 32 : (Math.floor(frame / 8) % 2 ? 16 : 0);
            ctx.save(); ctx.translate(Math.floor(this.x + this.w), Math.floor(this.y)); ctx.scale(-1, 1);
            ctx.drawImage(spriteSheet, sx, 0, 16, 16, 0, 0, this.w, this.h); ctx.restore();
        },
        jump() {
            if (this.jumpCount < CONFIG.MAX_JUMPS && !this.isFallingIntoPit) {
                this.vy = (this.jumpCount === 0) ? CONFIG.FIRST_JUMP_POWER : CONFIG.SECOND_JUMP_POWER;
                this.jumpCount++;
                // ★調整ポイント: ジャンプ時の土埃の数（6）
                createDust(this.x + this.w/2, this.y + this.h, 6, COLORS.EFFECT);
            }
        }
    };

    function spawnObstacle() {
        if (distanceTraveled >= nextSpawnDistance) {
            distanceTraveled = 0;
            // スピードが上がるにつれて、障害物の間隔を開けるための補正係数（初期値15）
            let speedFactor = (currentSpeed - CONFIG.BASE_SPEED) * 50;
            
            // ★調整ポイント: 次の障害物が出るまでの距離（初期値ベース250 + ランダム0〜250 + スピード補正）
            nextSpawnDistance = 200 + Math.random() * 200 + speedFactor;
            
            const rand = Math.random();
            let type, w, h, y, isPassable = false;
            
            // ★調整ポイント: 障害物の出現確率とサイズ
            if (rand < 0.25) { 
                // 25%の確率で「落とし穴（PIT）」
                type = 'PIT'; 
                w = 80 + Math.random() * 110; // 幅: 80〜190
                h = 100; // 深さ
                y = GROUND_Y; 
            } 
            else if (rand < 0.60) { 
                // 35% (0.60 - 0.25) の確率で「壁（WALL）」
                type = 'WALL'; 
                h = 40 + Math.random() * 60; // 高さ: 40〜100
                w = 20 + Math.random() * 30; // 幅: 20〜50
                y = GROUND_Y - h; 
            } 
            else { 
                // 残り40%の確率で「浮遊物（FLOAT）」
                type = 'FLOAT'; 
                
                if (Math.random() < 0.4) { 
                    // 浮遊物のうち40%は「下をくぐれる」
                    isPassable = true; 
                    // ★調整ポイント: くぐれる場合は長くても問題ないので、元のランダム幅を使用
                    w = 30 + Math.random() * 120; // 幅: 30〜150
                    h = 20 + Math.random() * 40; // 高さ: 20〜60
                    // ★調整ポイント: 地面からの隙間（プレイヤーサイズ + 5〜45ピクセルの余裕）
                    let gap = CONFIG.PLAYER_SIZE + 5 + Math.random() * 40; 
                    y = GROUND_Y - gap - h; 
                } 
                else { 
                    // 浮遊物のうち50%は「飛び越える」
                    isPassable = false; 
                    
                    // ★調整ポイント: 飛び越える浮遊物の幅をスピード依存にして序盤の詰みを防止
                    // 現在のスピードから安全に飛び越えられる最大幅を計算します（係数8をいじると難易度が変わります）
                    // 序盤(スピード5)は最大60程度、スピードが上がると長くなっていきます。
                    let maxSafeWidth = currentSpeed * 7; 
                    w = 20 + Math.random() * maxSafeWidth;
                    
                    // スピードが上がりすぎた時のために、幅の絶対的な上限を150に制限します
                    w = Math.min(w, 150); 
                    
                    h = 30 + Math.random() * 50; // 高さ: 30〜80
                    // ★調整ポイント: 地面からの隙間（10〜25ピクセル）
                    let gap = 10 + Math.random() * 15; 
                    y = GROUND_Y - gap - h; 
                }
            }
            obstacles.push({ type, x: canvas.width, y, w, h, isPassable });
        }
    }

    function loop() {
        if (!gameActive) return;
        frame++; 
        
        // ★調整ポイント: スコアの加算量（現在のスピードの半分を毎フレーム加算）
        score += Math.floor(currentSpeed / 2); 
        currentSpeed += CONFIG.SPEED_UP_RATIO;
        
        let effectiveSpeed = (player.jumpCount === 2) ? currentSpeed * CONFIG.SECOND_JUMP_SPEED_MULTI : currentSpeed;
        distanceTraveled += effectiveSpeed;
        player.update(); spawnObstacle();
        
        ctx.fillStyle = COLORS.BG; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // ★調整ポイント: 背景の星（ライン）が流れる速度（0.15）
        bgScroll -= effectiveSpeed * 0.15; 
        ctx.fillStyle = "rgba(255,255,255,0.05)";
        
        // ★調整ポイント: 背景の星（ライン）の数と間隔
        for (let i = 0; i < 15; i++) { 
            let bx = (bgScroll % 100) + i * 100; // 100ピクセル間隔
            ctx.fillRect(Math.floor(bx), 0, 1, canvas.height); 
        }
        
        ctx.fillStyle = COLORS.FG; ctx.fillRect(0, GROUND_Y, canvas.width, 4); 
        
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i]; o.x -= effectiveSpeed;
            if (o.type === 'PIT') { ctx.fillStyle = COLORS.BG; ctx.fillRect(Math.floor(o.x), GROUND_Y, Math.floor(o.w), 10); } 
            else { ctx.fillStyle = COLORS.FG; ctx.fillRect(Math.floor(o.x), Math.floor(o.y), Math.floor(o.w), Math.floor(o.h)); }
            
            if (o.type !== 'PIT') {
                const mx = CONFIG.HIT_BOX_MARGIN_X; const my = CONFIG.HIT_BOX_MARGIN_Y;
                if (o.x < player.x + player.w - mx && o.x + o.w > player.x + mx && o.y < player.y + player.h - my && o.y + o.h > player.y + my) gameOver("CRASHED!");
            }
            // ★調整ポイント: 障害物をメモリから削除する位置（画面左端から-300ピクセル見えなくなったら消す）
            if (o.x < -300) obstacles.splice(i, 1);
        }
        
        for (let i = particles.length - 1; i >= 0; i--) { let p = particles[i]; p.update(); p.draw(); if (p.life <= 0) particles.splice(i, 1); }
        player.draw();
        scoreDisplay.innerText = "SCORE: " + String(score).padStart(6, '0');
        requestAnimationFrame(loop);
    }

    function gameOver(msg) {
        gameActive = false;
        // ★調整ポイント: ゲームオーバー時のパーティクルの数（30）
        createDust(player.x + player.w/2, player.y + player.h/2, 30, COLORS.EFFECT);
        
        let isNewRecord = false;
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('pixelRunHighScore', highScore);
            isNewRecord = true;
        }

        // ★調整ポイント: ゲームオーバー画面が表示されるまでの遅延時間（500ミリ秒）
        setTimeout(() => {
            document.getElementById('final-score').innerText = "SCORE: " + String(score).padStart(6, '0');
            document.getElementById('best-score-notice').innerText = (isNewRecord ? "NEW RECORD! " : "BEST: ") + String(highScore).padStart(6, '0');
            gameOverScreen.style.display = 'flex';
        }, 500);
    }

    function initGame() {
        score = 0; currentSpeed = CONFIG.BASE_SPEED; obstacles = []; particles = [];
        player.y = GROUND_Y - CONFIG.PLAYER_SIZE; player.vy = 0; player.jumpCount = 0; player.isFallingIntoPit = false;
        gameActive = true;
        startScreen.style.display = 'none';
        gameOverScreen.style.display = 'none';
        loop();
    }

    document.getElementById('start-button').addEventListener('click', initGame);
    document.getElementById('restart-button').addEventListener('click', initGame);

    window.addEventListener('keydown', (e) => { 
        if (e.code === 'Space' || e.code === 'ArrowUp') {
            if (!gameActive && gameOverScreen.style.display === 'none') initGame();
            else if (gameActive) player.jump();
        }
    });

    canvas.addEventListener('touchstart', (e) => { 
        if(gameActive) { player.jump(); e.preventDefault(); }
    }, {passive: false});

</script>
</body>
</html>
